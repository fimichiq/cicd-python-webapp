name: CD (dev)

# Runs after CI completes on main. We deploy the exact commit that CI built,
# pulling the immutable sha-<short> image from GHCR. The job runs on a
# self-hosted runner that has kubectl access to the local microk8s cluster.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    # Only CI runs whose source ref is `main` trigger this workflow at all.
    # Feature-branch CI completions don't create a skipped cd-dev run in the
    # Actions UI; if you want to deploy a feature branch's image, use the
    # workflow_dispatch path below.
    branches: [main]
  # Manual trigger. Pick the source branch via GitHub's "Use workflow from"
  # dropdown — feature branches are supported as long as CI has already
  # built+pushed the sha-<short> image for that branch's HEAD.
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy. Leave empty to use the dispatched ref's HEAD."
        required: false
        default: ""

permissions:
  contents: read

# Never run two dev deploys in parallel — the cluster is a shared resource
# and overlapping rollouts confuse `kubectl rollout status`.
concurrency:
  group: cd-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy to app-dev
    # The "is this main?" gate lives in the `on.workflow_run.branches`
    # filter above. Here we only confirm CI succeeded (workflow_dispatch
    # bypasses that since it carries no parent run).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, microk8s]
    timeout-minutes: 10
    env:
      NAMESPACE: app-dev
      DEPLOYMENT: app
      OVERLAY: k8s/overlays/dev
      IMAGE_NAME: cicd-python-webapp
      IMAGE_REPO: ghcr.io/fimichiq/cicd-python-webapp
      SELECTOR: app.kubernetes.io/name=cicd-python-webapp
    steps:
      - name: Resolve commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.sha }}" ]; then
            FULL_SHA="${{ inputs.sha }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            FULL_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            FULL_SHA="${{ github.sha }}"
          fi
          SHORT_SHA="${FULL_SHA:0:7}"
          echo "full_sha=${FULL_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Deploying ${FULL_SHA} → image tag sha-${SHORT_SHA}"

      - name: Checkout that commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.full_sha }}

      - name: Pin image tag in dev overlay
        working-directory: ${{ env.OVERLAY }}
        run: |
          kustomize edit set image ${IMAGE_NAME}=${IMAGE_REPO}:${{ steps.sha.outputs.image_tag }}
          echo "--- kustomization after edit ---"
          cat kustomization.yaml

      - name: Apply overlay
        run: kubectl apply -k ${OVERLAY}

      - name: Wait for rollout
        id: rollout
        run: |
          kubectl rollout status deployment/${DEPLOYMENT} -n ${NAMESPACE} --timeout=300s

      - name: Smoke test (in-pod /health via kubectl exec)
        id: smoke
        # We hit /health from inside the pod (kubectl exec → 127.0.0.1) rather
        # than through the Ingress, because the local cluster has an open
        # CNI/iptables interaction that intermittently breaks ingress->pod
        # traffic. Documented in README → "Deploy manually to microk8s".
        # The exec-based smoke test is actually a better health gate anyway:
        # it isolates "did the rollout produce a healthy pod" from "is the
        # ingress path working".
        #
        # Bind the smoke target to the NEW ReplicaSet (via pod-template-hash)
        # instead of "any phase=Running pod for the deployment". After
        # `rollout status` returns, an old-RS pod can still appear Running
        # for a beat while the kubelet hasn't yet flipped it to
        # Succeeded/Failed — but its containerd task is already gone, so
        # `kubectl exec` fails with "task ... not found". This is also more
        # semantically correct: we want to verify *this* revision.
        run: |
          NEW_RS=$(kubectl get rs -n ${NAMESPACE} -l ${SELECTOR} \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.name}')
          HASH=$(kubectl get rs -n ${NAMESPACE} "${NEW_RS}" \
            -o jsonpath='{.metadata.labels.pod-template-hash}')
          POD=$(kubectl get pod -n ${NAMESPACE} \
            -l ${SELECTOR},pod-template-hash=${HASH} \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}')
          if [ -z "$POD" ]; then
            echo "No running pod found for new RS ${NEW_RS}" >&2
            exit 1
          fi
          echo "Smoke-testing pod: $POD (RS=${NEW_RS})"
          kubectl exec -n ${NAMESPACE} "$POD" -- python -c "
          import json, sys, urllib.request
          body = urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read().decode()
          print(body)
          sys.exit(0 if json.loads(body).get('status') == 'ok' else 1)
          "

      - name: Auto-rollback on failure
        if: failure() && (steps.rollout.conclusion == 'failure' || steps.smoke.conclusion == 'failure')
        run: |
          echo "::warning::Deploy failed — rolling back deployment/${DEPLOYMENT} in ${NAMESPACE}."
          kubectl rollout undo deployment/${DEPLOYMENT} -n ${NAMESPACE}
          kubectl rollout status deployment/${DEPLOYMENT} -n ${NAMESPACE} --timeout=300s
          echo "Rollback complete."
          exit 1

      - name: Summary
        if: always()
        run: |
          {
            echo "### CD (dev) — ${{ job.status }}"
            echo ""
            echo "- Commit: \`${{ steps.sha.outputs.full_sha }}\`"
            echo "- Image:  \`${IMAGE_REPO}:${{ steps.sha.outputs.image_tag }}\`"
            echo "- Namespace: \`${NAMESPACE}\`"
            echo ""
            echo "Recent rollout history:"
            echo '```'
            kubectl rollout history deployment/${DEPLOYMENT} -n ${NAMESPACE} | tail -n 10 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
