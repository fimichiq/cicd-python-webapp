# SealedSecret for app-secret (decrypts to: SECRET_KEY, ADMIN_TOKEN).
#
# The `encryptedData` values below are PLACEHOLDERS and will NOT decrypt on
# your cluster — they were sealed against a different keypair. Regenerate
# this file once per cluster (or on key rotation) following README →
# "Manage secrets". A `kubectl apply -k` of this overlay before regen will
# leave the controller logging "no key could decrypt secret" and the app
# pod stuck in `CreateContainerConfigError` because the underlying Secret
# was never produced.
#
# Why we still commit the placeholder: it documents the SHAPE of the
# resource so reviewers can see what keys the app expects, and the K8s
# resource name (`app-secret`) so the `envFrom: secretRef` in
# deployment.yaml has a target to bind to in plain reading of the manifests.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: app-secret
  annotations:
    # cluster-wide scope means the resulting Secret will adopt this same
    # name+namespace pair; overlays inject `namespace:` so each env gets
    # its own decrypted copy from the same sealed source.
    sealedsecrets.bitnami.com/cluster-wide: "true"
spec:
  encryptedData:
    SECRET_KEY: PLACEHOLDER_SEAL_ME_WITH_KUBESEAL_AGAINST_YOUR_CLUSTER
    ADMIN_TOKEN: PLACEHOLDER_SEAL_ME_WITH_KUBESEAL_AGAINST_YOUR_CLUSTER
  template:
    metadata:
      name: app-secret
      labels:
        app.kubernetes.io/name: cicd-python-webapp
    type: Opaque
