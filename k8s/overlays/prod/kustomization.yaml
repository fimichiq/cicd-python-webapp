apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-prod

resources:
  - namespace.yaml
  - ../../base

# Default tag here is overridden by the prod CD workflow (Phase 9)
# to the actual semver tag, e.g. v1.0.0.
images:
  - name: cicd-python-webapp
    newName: ghcr.io/fimichiq/cicd-python-webapp
    newTag: main

replicas:
  - name: app
    count: 3

configMapGenerator:
  - name: app-config
    literals:
      - APP_VERSION=prod

patches:
  - target:
      kind: Ingress
      name: app
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: prod.app.local
