apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-staging

resources:
  - namespace.yaml
  - ../../base

# Default tag here is overridden by the staging CD workflow (Phase 8)
# to the actual release-candidate tag, e.g. v0.1.0-rc1.
images:
  - name: cicd-python-webapp
    newName: ghcr.io/fimichiq/cicd-python-webapp
    newTag: main

replicas:
  - name: app
    count: 2

configMapGenerator:
  - name: app-config
    literals:
      - APP_VERSION=staging

patches:
  - target:
      kind: Ingress
      name: app
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.app.local
